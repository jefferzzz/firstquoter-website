<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FirstQuoter — Quoting & Invoicing for UK Tradespeople</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8f9fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 56px 48px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .logo span {
      color: #0ea5e9;
    }

    .tagline {
      font-size: 15px;
      color: #64748b;
      margin-bottom: 32px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .divider {
      width: 40px;
      height: 3px;
      background: #0ea5e9;
      border-radius: 2px;
      margin: 0 auto 32px;
    }

    .headline {
      font-size: 22px;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.35;
      margin-bottom: 16px;
    }

    .description {
      font-size: 15px;
      color: #64748b;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .badge {
      display: inline-block;
      background: #f0f9ff;
      color: #0ea5e9;
      border: 1px solid #bae6fd;
      border-radius: 20px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">First<span>Quoter</span></div>
    <div class="tagline">Quote it. Send it. Win it.</div>
    <div class="divider"></div>
    <div class="headline">Quoting &amp; invoicing built for UK tradespeople</div>
    <p class="description">
      Professional quotes and invoices for electricians, plumbers,<br>
      builders, decorators and more. Sent in minutes, straight from your phone.
    </p>
    <div class="badge">🚀 Launching soon</div>
  </div>
</body>
</html>
